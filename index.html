<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saif Qaryeb</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>
    :root{
      --text:#ffffff;
      --muted:rgba(255,255,255,.82);
      --glass1:rgba(255,255,255,.15);
      --glass2:rgba(255,255,255,.07);
      --stroke:rgba(255,255,255,.18);
      --shadow:0 28px 60px rgba(0,0,0,.38);

      --ig1:#e1306c;
      --ig2:#ff4f8a;
      --tt1:#0d0e11;
      --tt2:#1b1c20;
      --snap1:#fff200;
      --snap2:#ffea00;
      --wa1:#16b857;
      --wa2:#25d366;

      --bg-overlay1:rgba(8,12,18,.28);
      --bg-overlay2:rgba(8,12,18,.62);
    }

    body.theme-purple{
      --glass1:rgba(186, 104, 255, .16);
      --glass2:rgba(115, 54, 180, .10);
      --stroke:rgba(220,180,255,.18);
      --shadow:0 28px 60px rgba(47, 10, 74, .45);
      --bg-overlay1:rgba(32,12,44,.28);
      --bg-overlay2:rgba(20,10,30,.62);
    }

    body.theme-blue{
      --glass1:rgba(91, 174, 255, .15);
      --glass2:rgba(16, 70, 116, .10);
      --stroke:rgba(155,220,255,.18);
      --shadow:0 28px 60px rgba(6, 30, 57, .42);
      --bg-overlay1:rgba(8,25,40,.28);
      --bg-overlay2:rgba(7,19,34,.62);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Cairo",sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      overflow-x:hidden;
      color:var(--text);
      background:#0d1118;
      position:relative;
      transition:background .35s ease;
    }

    .bg{
      position:fixed;
      inset:0;
      background:
        linear-gradient(var(--bg-overlay1), var(--bg-overlay2)),
        url("back.jpg") center center / cover no-repeat;
      z-index:-5;
      transform:scale(1.08);
      animation:bgDrift 22s ease-in-out infinite alternate;
      will-change:transform;
      transition:.35s ease;
    }

    @keyframes bgDrift{
      0%   { transform:scale(1.08) translate3d(0,0,0); }
      50%  { transform:scale(1.09) translate3d(-4px,0,0); }
      100% { transform:scale(1.085) translate3d(4px,0,0); }
    }

    .bg::before,
    .bg::after{
      content:"";
      position:absolute;
      border-radius:50%;
      filter:blur(90px);
      opacity:.16;
      pointer-events:none;
    }

    .bg::before{
      width:300px;
      height:300px;
      background:#ff4f8a;
      top:8%;
      left:8%;
      animation:blob1 14s ease-in-out infinite alternate;
    }

    .bg::after{
      width:340px;
      height:340px;
      background:#3aa1ff;
      bottom:6%;
      right:8%;
      animation:blob2 16s ease-in-out infinite alternate;
    }

    @keyframes blob1{
      from{ transform:translate(0,0); }
      to{ transform:translate(10px,-6px); }
    }

    @keyframes blob2{
      from{ transform:translate(0,0); }
      to{ transform:translate(-10px,8px); }
    }

    .particles{
      position:fixed;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:-4;
    }

    .particle{
      position:absolute;
      width:6px;
      height:6px;
      border-radius:50%;
      background:rgba(255,255,255,.22);
      animation:floatParticle linear infinite;
      opacity:.55;
    }

    @keyframes floatParticle{
      0%{
        transform:translateY(110vh) scale(.6);
        opacity:0;
      }
      15%{
        opacity:.55;
      }
      100%{
        transform:translateY(-10vh) scale(1);
        opacity:0;
      }
    }

    .lang-overlay{
      position:fixed;
      inset:0;
      background:rgba(8,10,15,.58);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:100;
      transition:.45s ease;
    }

    .lang-overlay.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .lang-box{
      width:min(92vw, 430px);
      border-radius:28px;
      padding:30px 22px 24px;
      text-align:center;
      background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 24px 60px rgba(0,0,0,.38);
      animation:popIn .7s cubic-bezier(.18,.89,.32,1.2);
      position:relative;
      overflow:hidden;
    }

    @keyframes popIn{
      from{
        opacity:0;
        transform:scale(.88) translateY(16px);
      }
      to{
        opacity:1;
        transform:scale(1) translateY(0);
      }
    }

    .lang-title{
      font-size:1.7rem;
      font-weight:800;
      margin-bottom:8px;
    }

    .lang-sub{
      color:var(--muted);
      font-size:1rem;
      margin-bottom:22px;
      line-height:1.8;
    }

    .lang-buttons{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .lang-btn{
      position:relative;
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:18px;
      padding:16px 14px;
      font-size:1.05rem;
      font-weight:800;
      color:#fff;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      transition:.22s ease;
      overflow:hidden;
    }

    .lang-btn:hover{
      transform:translateY(-2px) scale(1.01);
      background:rgba(255,255,255,.14);
    }

    .wrap{
      width:min(100%, 560px);
      perspective:1200px;
      animation:fadeUp .85s ease;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(20px) scale(.985);
      }
      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:34px;
      padding:28px 22px 22px;
      background:linear-gradient(180deg, var(--glass1), var(--glass2));
      border:1px solid var(--stroke);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.10);
      transform-style:preserve-3d;
      animation:cardFloat 12s ease-in-out infinite;
      transition:transform .18s ease, background .35s ease, border-color .35s ease;
    }

    @keyframes cardFloat{
      0%   { transform:rotate(-0.6deg) translateX(-4px); }
      50%  { transform:rotate(0.6deg) translateX(4px); }
      100% { transform:rotate(-0.6deg) translateX(-4px); }
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.10), transparent 36%, transparent 72%, rgba(255,255,255,.05));
      pointer-events:none;
    }

    .card::after{
      content:"";
      position:absolute;
      top:-30%;
      left:-45%;
      width:40%;
      height:180%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
      transform:rotate(18deg);
      animation:shineMove 10s linear infinite;
      pointer-events:none;
    }

    @keyframes shineMove{
      0%{ left:-55%; }
      100%{ left:130%; }
    }

    .top-actions{
      display:flex;
      justify-content:flex-end;
      margin-bottom:8px;
    }

    .theme-btn{
      border:none;
      outline:none;
      cursor:pointer;
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      width:42px;
      height:42px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1rem;
      transition:.22s ease;
    }

    .theme-btn:hover{
      background:rgba(255,255,255,.13);
      transform:translateY(-2px);
    }

    .profile{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      margin-bottom:22px;
    }

    .avatar-wrap{
      width:126px;
      height:126px;
      border-radius:50%;
      padding:4px;
      background:linear-gradient(135deg, #f5e4c3, #8a8077, #fff);
      box-shadow:0 12px 26px rgba(0,0,0,.34);
      margin-bottom:18px;
      position:relative;
      animation:avatarGlow 5s ease-in-out infinite;
    }

    @keyframes avatarGlow{
      0%,100%{
        box-shadow:0 12px 26px rgba(0,0,0,.34), 0 0 0 0 rgba(255,255,255,.08);
      }
      50%{
        box-shadow:0 14px 30px rgba(255,255,255,.10), 0 12px 26px rgba(0,0,0,.34), 0 0 0 10px rgba(255,255,255,.025);
      }
    }

    .avatar-wrap::after{
      content:"";
      position:absolute;
      inset:-6px;
      border:1px solid rgba(255,255,255,.16);
      border-radius:50%;
    }

    .avatar{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      display:block;
      border:3px solid rgba(255,255,255,.76);
      background:#222;
    }

    .greeting{
      font-size:.95rem;
      color:rgba(255,255,255,.78);
      margin-bottom:6px;
      font-weight:700;
      min-height:24px;
    }

    .name-inline{
      font-size:2.2rem;
      font-weight:800;
      line-height:1.1;
      margin-bottom:12px;
      text-shadow:0 6px 20px rgba(0,0,0,.18);
    }

    .bio{
      color:rgba(255,255,255,.95);
      font-size:1rem;
      line-height:1.95;
    }

    .main-links{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .btn{
      position:relative;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-decoration:none;
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:20px;
      padding:15px 18px;
      font-size:1.02rem;
      font-weight:800;
      transition:transform .18s ease, box-shadow .24s ease, filter .24s ease;
      overflow:hidden;
      user-select:none;
      color:#fff;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      animation:buttonFade .8s ease both;
    }

    .btn:nth-child(1){ animation-delay:.08s; }
    .btn:nth-child(2){ animation-delay:.16s; }
    .btn:nth-child(3){ animation-delay:.24s; }
    .btn:nth-child(4){ animation-delay:.32s; }

    @keyframes buttonFade{
      from{
        opacity:0;
        transform:translateY(12px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .btn i{
      font-size:1.12rem;
    }

    .btn:hover{
      transform:translateY(-2px) scale(1.01);
      filter:brightness(1.03);
    }

    .lang-btn::before,
    .btn::before,
    .mini-btn::before{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:52%;
      height:100%;
      transform:skewX(-24deg);
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.28), transparent);
      transition:left .65s ease;
      pointer-events:none;
    }

    .lang-btn:hover::before,
    .btn:hover::before,
    .mini-btn:hover::before{
      left:130%;
    }

    .instagram{ background:linear-gradient(90deg, var(--ig1), var(--ig2)); }
    .tiktok{ background:linear-gradient(90deg, var(--tt1), var(--tt2)); }
    .snapchat{ color:#111; background:linear-gradient(90deg, var(--snap1), var(--snap2)); }
    .whatsapp{ background:linear-gradient(90deg, var(--wa1), var(--wa2)); }

    .mini-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:14px;
    }

    .mini-btn{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:14px 16px;
      border-radius:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      font-size:.95rem;
      font-weight:800;
      cursor:pointer;
      transition:transform .18s ease, background .22s ease;
      overflow:hidden;
    }

    .mini-btn:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.11);
    }

    .btn.clicked,
    .mini-btn.clicked,
    .lang-btn.clicked{
      animation:press .45s ease;
    }

    @keyframes press{
      0%{ transform:scale(1); }
      35%{ transform:scale(.97); }
      70%{ transform:scale(1.02); }
      100%{ transform:scale(1); }
    }

    .ripple{
      position:absolute;
      border-radius:50%;
      transform:scale(0);
      background:rgba(255,255,255,.34);
      animation:ripple .72s ease-out forwards;
      pointer-events:none;
    }

    @keyframes ripple{
      to{
        transform:scale(16);
        opacity:0;
      }
    }

    .line{
      height:1px;
      background:rgba(255,255,255,.13);
      margin:20px 0 12px;
    }

    .footer{
      text-align:center;
      color:rgba(255,255,255,.82);
      font-size:.95rem;
    }

    .footer span{
      color:#ff5f7e;
      font-weight:800;
    }

    .toast{
      position:fixed;
      bottom:18px;
      left:50%;
      transform:translateX(-50%) translateY(20px);
      background:rgba(15,18,24,.92);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      padding:12px 16px;
      border-radius:14px;
      opacity:0;
      pointer-events:none;
      transition:.28s ease;
      box-shadow:0 12px 30px rgba(0,0,0,.26);
      font-size:.94rem;
      font-weight:700;
      z-index:50;
      white-space:nowrap;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width: 640px){
      body{ padding:12px; }
      .wrap{ width:100%; max-width:100%; }
      .card{
        border-radius:24px;
        padding:20px 14px 16px;
        animation:none;
      }
      .avatar-wrap{
        width:102px;
        height:102px;
        margin-bottom:14px;
      }
      .name-inline{
        font-size:1.9rem;
      }
      .greeting{
        font-size:.88rem;
      }
      .bio{
        font-size:.93rem;
        line-height:1.8;
      }
      .main-links{
        gap:12px;
      }
      .btn{
        min-height:56px;
        border-radius:17px;
        font-size:.96rem;
        padding:14px 14px;
      }
      .btn i{
        font-size:1rem;
      }
      .mini-row{
        grid-template-columns:1fr 1fr;
        gap:10px;
      }
      .mini-btn{
        border-radius:15px;
        padding:13px 10px;
        font-size:.88rem;
      }
      .lang-buttons{
        grid-template-columns:1fr;
      }
      .lang-box{
        border-radius:24px;
        padding:24px 16px 18px;
      }
      .lang-title{
        font-size:1.45rem;
      }
      .lang-sub{
        font-size:.95rem;
      }
    }

    @media (max-width: 430px){
      .mini-row{
        grid-template-columns:1fr;
      }
      .name-inline{
        font-size:1.72rem;
      }
      .bio{
        font-size:.9rem;
      }
      .footer{
        font-size:.88rem;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="particles" id="particles"></div>

  <div class="lang-overlay" id="langOverlay">
    <div class="lang-box">
      <div class="lang-title" id="langTitle">اختر لغتك</div>
      <div class="lang-sub" id="langSub">Choose your language to continue</div>
      <div class="lang-buttons">
        <button class="lang-btn" id="arabicBtn">العربية</button>
        <button class="lang-btn" id="englishBtn">English</button>
      </div>
    </div>
  </div>

  <main class="wrap">
    <section class="card" id="card">

      <div class="top-actions">
        <button class="theme-btn" id="themeBtn" title="Change Theme">
          <i class="fa-solid fa-palette"></i>
        </button>
      </div>

      <div class="profile">
        <div class="avatar-wrap">
          <img src="profile.jpg" alt="Saif Qaryeb" class="avatar">
        </div>

        <div class="greeting" id="greetingText">أهلًا بك</div>

        <div class="name-inline" id="nameText">سيف قريب</div>

        <div class="bio" id="bioText">
          هندسة حاسوب 25<br>
          موقع تجريبي 2026/2027
        </div>
      </div>

      <div class="main-links">
        <a class="btn instagram" href="https://instagram.com/saifqaryeb" target="_blank" rel="noopener">
          <span id="instagramText">إنستغرام</span>
          <i class="fa-brands fa-instagram"></i>
        </a>

        <a class="btn tiktok" href="https://www.tiktok.com/@saifqaryeb" target="_blank" rel="noopener">
          <span id="tiktokText">تيك توك</span>
          <i class="fa-brands fa-tiktok"></i>
        </a>

        <a class="btn snapchat" href="https://www.snapchat.com/add/saif-qaryeb" target="_blank" rel="noopener">
          <span id="snapchatText">سناب شات</span>
          <i class="fa-brands fa-snapchat"></i>
        </a>

        <a class="btn whatsapp" href="https://wa.me/972598893689?text=مرحبا%20سيف" target="_blank" rel="noopener">
          <span id="whatsappText">واتساب</span>
          <i class="fa-brands fa-whatsapp"></i>
        </a>
      </div>

      <div class="mini-row">
        <button class="mini-btn" id="shareBtn">
          <span id="shareText">مشاركة الموقع</span>
          <i class="fa-solid fa-share-nodes"></i>
        </button>

        <button class="mini-btn" id="copyUserBtn">
          <span id="copyUserText">نسخ اليوزر</span>
          <i class="fa-regular fa-copy"></i>
        </button>
      </div>

      <div class="line"></div>
      <div class="footer" id="footerText">Made with <span>♥</span> by Saif</div>
    </section>
  </main>

  <div class="toast" id="toast">Done</div>

  <script>
    const toast = document.getElementById("toast");
    const langOverlay = document.getElementById("langOverlay");
    const greetingText = document.getElementById("greetingText");
    const body = document.body;

    const translations = {
      ar: {
        htmlLang: "ar",
        dir: "rtl",
        title: "سيف قريب",
        langTitle: "اختر لغتك",
        langSub: "Choose your language to continue",
        name: "سيف قريب",
        bio: "هندسة حاسوب 25<br>موقع تجريبي 2026/2027",
        instagram: "إنستغرام",
        tiktok: "تيك توك",
        snapchat: "سناب شات",
        whatsapp: "واتساب",
        share: "مشاركة الموقع",
        copyUser: "نسخ اليوزر",
        footer: 'Made with <span>♥</span> by Saif',
        copiedUser: "تم نسخ اليوزر",
        copiedLink: "تم نسخ الرابط",
        shareUnavailable: "المشاركة غير متاحة",
        morning: "صباح الخير",
        afternoon: "نهارك سعيد",
        evening: "مساء الخير",
        night: "مساؤك جميل"
      },
      en: {
        htmlLang: "en",
        dir: "ltr",
        title: "Saif Qaryeb",
        langTitle: "Choose your language",
        langSub: "اختر لغتك للمتابعة",
        name: "Saif Qaryeb",
        bio: "Computer Engineering 25<br>Interactive Personal Website",
        instagram: "Instagram",
        tiktok: "TikTok",
        snapchat: "Snapchat",
        whatsapp: "WhatsApp",
        share: "Share Site",
        copyUser: "Copy Username",
        footer: 'Made with <span>♥</span> by Saif',
        copiedUser: "Username copied",
        copiedLink: "Link copied",
        shareUnavailable: "Share unavailable",
        morning: "Good Morning",
        afternoon: "Good Afternoon",
        evening: "Good Evening",
        night: "Good Night"
      }
    };

    let currentLang = "ar";

    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function getGreeting(lang){
      const hour = new Date().getHours();
      const t = translations[lang];

      if(hour >= 5 && hour < 12) return t.morning;
      if(hour >= 12 && hour < 17) return t.afternoon;
      if(hour >= 17 && hour < 22) return t.evening;
      return t.night;
    }

    function applyLanguage(lang){
      currentLang = lang;
      const t = translations[lang];

      document.documentElement.lang = t.htmlLang;
      document.documentElement.dir = t.dir;
      document.title = t.title;

      document.getElementById("langTitle").textContent = t.langTitle;
      document.getElementById("langSub").textContent = t.langSub;
      document.getElementById("nameText").textContent = t.name;
      document.getElementById("bioText").innerHTML = t.bio;
      document.getElementById("instagramText").textContent = t.instagram;
      document.getElementById("tiktokText").textContent = t.tiktok;
      document.getElementById("snapchatText").textContent = t.snapchat;
      document.getElementById("whatsappText").textContent = t.whatsapp;
      document.getElementById("shareText").textContent = t.share;
      document.getElementById("copyUserText").textContent = t.copyUser;
      document.getElementById("footerText").innerHTML = t.footer;
      greetingText.textContent = getGreeting(lang);
    }

    function chooseLanguage(lang){
      applyLanguage(lang);
      langOverlay.classList.add("hide");
    }

    document.getElementById("arabicBtn").addEventListener("click", () => chooseLanguage("ar"));
    document.getElementById("englishBtn").addEventListener("click", () => chooseLanguage("en"));

    document.querySelectorAll(".btn, .mini-btn, .lang-btn, .theme-btn").forEach((btn) => {
      btn.addEventListener("click", function(e) {
        this.classList.remove("clicked");
        void this.offsetWidth;
        this.classList.add("clicked");

        const rect = this.getBoundingClientRect();
        const ripple = document.createElement("span");
        ripple.className = "ripple";

        const size = Math.max(rect.width, rect.height);
        ripple.style.width = size + "px";
        ripple.style.height = size + "px";
        ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
        ripple.style.top = (e.clientY - rect.top - size / 2) + "px";

        this.appendChild(ripple);

        setTimeout(() => {
          ripple.remove();
          this.classList.remove("clicked");
        }, 720);
      });
    });

    document.getElementById("copyUserBtn").addEventListener("click", async () => {
      try{
        await navigator.clipboard.writeText("@saifqaryeb");
        showToast(translations[currentLang].copiedUser);
      }catch{
        showToast("Copy failed");
      }
    });

    document.getElementById("shareBtn").addEventListener("click", async () => {
      if (navigator.share) {
        try{
          await navigator.share({
            title: "Saif Qaryeb",
            text: "Check out my website",
            url: window.location.href
          });
        }catch(e){}
      } else {
        try{
          await navigator.clipboard.writeText(window.location.href);
          showToast(translations[currentLang].copiedLink);
        }catch{
          showToast(translations[currentLang].shareUnavailable);
        }
      }
    });

    const themes = ["default", "purple", "blue"];
    let currentThemeIndex = 0;

    document.getElementById("themeBtn").addEventListener("click", () => {
      body.classList.remove("theme-purple", "theme-blue");
      currentThemeIndex = (currentThemeIndex + 1) % themes.length;

      if(themes[currentThemeIndex] === "purple"){
        body.classList.add("theme-purple");
      } else if(themes[currentThemeIndex] === "blue"){
        body.classList.add("theme-blue");
      }
    });

    const card = document.getElementById("card");
    if (window.innerWidth > 768) {
      card.addEventListener("mousemove", (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const rotateX = ((y - centerY) / centerY) * -1.8;
        const rotateY = ((x - centerX) / centerX) * 1.8;

        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      });

      card.addEventListener("mouseleave", () => {
        card.style.transform = "";
      });
    }

    const particlesContainer = document.getElementById("particles");
    for(let i = 0; i < 16; i++){
      const p = document.createElement("span");
      p.className = "particle";
      p.style.left = Math.random() * 100 + "vw";
      p.style.animationDuration = (12 + Math.random() * 10) + "s";
      p.style.animationDelay = Math.random() * 8 + "s";
      p.style.opacity = (0.15 + Math.random() * 0.25).toFixed(2);
      p.style.width = p.style.height = (4 + Math.random() * 4) + "px";
      particlesContainer.appendChild(p);
    }
  </script>

</body>
</html>
