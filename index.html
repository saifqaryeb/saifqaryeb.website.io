<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saif Qaryeb</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>
    :root{
      --text:#fff;
      --muted:rgba(255,255,255,.78);
      --glass-1:rgba(255,255,255,.12);
      --glass-2:rgba(255,255,255,.07);
      --stroke:rgba(255,255,255,.16);
      --shadow:0 24px 60px rgba(0,0,0,.35);
      --soft:rgba(255,255,255,.08);

      --ig1:#e1306c;
      --ig2:#ff4f8a;
      --tt1:#0d0e11;
      --tt2:#191b1f;
      --snap1:#fff200;
      --snap2:#ffea00;
      --wa1:#18b857;
      --wa2:#25d366;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Cairo",sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      color:var(--text);
      overflow-x:hidden;
      background:#0d1219;
      position:relative;
    }

    /* الخلفية المتحركة */
    .bg{
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(7,11,16,.28), rgba(7,11,16,.62)),
        url("back.jpg") center center / cover no-repeat;
      z-index:-5;
      transform:scale(1.06);
      animation:bgFloat 18s ease-in-out infinite alternate;
      will-change:transform;
    }

    @keyframes bgFloat{
      0%{
        transform:scale(1.06) translate3d(0,0,0);
      }
      50%{
        transform:scale(1.10) translate3d(-10px,-8px,0);
      }
      100%{
        transform:scale(1.08) translate3d(8px,6px,0);
      }
    }

    .bg::before,
    .bg::after{
      content:"";
      position:absolute;
      border-radius:50%;
      filter:blur(90px);
      opacity:.18;
      pointer-events:none;
    }

    .bg::before{
      width:280px;
      height:280px;
      background:#ff4f8a;
      top:8%;
      left:6%;
      animation:glowMove1 12s ease-in-out infinite alternate;
    }

    .bg::after{
      width:340px;
      height:340px;
      background:#37a2ff;
      right:8%;
      bottom:6%;
      animation:glowMove2 14s ease-in-out infinite alternate;
    }

    @keyframes glowMove1{
      from{ transform:translate(0,0); }
      to{ transform:translate(16px,-10px); }
    }

    @keyframes glowMove2{
      from{ transform:translate(0,0); }
      to{ transform:translate(-18px,12px); }
    }

    .wrap{
      width:min(100%, 980px);
      animation:fadeUp .85s ease;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(22px) scale(.985);
      }
      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:34px;
      background:linear-gradient(180deg, var(--glass-1), var(--glass-2));
      border:1px solid var(--stroke);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.10);
      padding:26px;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.08), transparent 35%, transparent 70%, rgba(255,255,255,.04));
      pointer-events:none;
    }

    .layout{
      display:grid;
      grid-template-columns: 1.4fr .9fr;
      gap:22px;
      align-items:center;
    }

    .left-side{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .stats-grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:12px;
    }

    .info-box{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      border-radius:22px;
      min-height:158px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:18px 14px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
    }

    .info-box i{
      font-size:1.2rem;
      margin-bottom:10px;
      opacity:.95;
    }

    .info-title{
      font-size:.9rem;
      color:var(--muted);
      font-weight:600;
      margin-bottom:6px;
    }

    .info-value{
      font-size:1.15rem;
      font-weight:800;
      color:#fff;
      margin-bottom:10px;
    }

    .small-btn{
      border:none;
      outline:none;
      cursor:pointer;
      padding:10px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.12);
      color:#fff;
      font-size:.88rem;
      font-weight:800;
      transition:.2s ease;
      min-width:120px;
    }

    .small-btn:hover{
      background:rgba(255,255,255,.18);
      transform:translateY(-1px);
    }

    .buttons-grid{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:14px;
    }

    .btn{
      position:relative;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-decoration:none;
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:20px;
      padding:15px 18px;
      font-size:1rem;
      font-weight:800;
      transition:transform .18s ease, box-shadow .24s ease, filter .24s ease;
      overflow:hidden;
      user-select:none;
      color:#fff;
    }

    .btn i{
      font-size:1.18rem;
    }

    .btn:hover{
      transform:translateY(-2px) scale(1.01);
      filter:brightness(1.03);
    }

    .btn:active{
      transform:scale(.985);
    }

    .btn::before,
    .mini-btn::before,
    .small-btn::before{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:52%;
      height:100%;
      transform:skewX(-24deg);
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.28), transparent);
      transition:left .65s ease;
      pointer-events:none;
    }

    .btn:hover::before,
    .mini-btn:hover::before,
    .small-btn:hover::before{
      left:130%;
    }

    .btn.clicked,
    .mini-btn.clicked,
    .small-btn.clicked{
      animation:press .45s ease;
    }

    @keyframes press{
      0%{ transform:scale(1); }
      35%{ transform:scale(.965); }
      70%{ transform:scale(1.03); }
      100%{ transform:scale(1); }
    }

    .ripple{
      position:absolute;
      border-radius:50%;
      transform:scale(0);
      background:rgba(255,255,255,.34);
      animation:ripple .72s ease-out forwards;
      pointer-events:none;
    }

    @keyframes ripple{
      to{
        transform:scale(16);
        opacity:0;
      }
    }

    .tiktok{
      background:linear-gradient(90deg, var(--tt1), var(--tt2));
      box-shadow:0 10px 24px rgba(0,0,0,.28);
    }

    .instagram{
      background:linear-gradient(90deg, var(--ig1), var(--ig2));
      box-shadow:0 10px 24px rgba(225,48,108,.25);
    }

    .whatsapp{
      background:linear-gradient(90deg, var(--wa1), var(--wa2));
      box-shadow:0 10px 24px rgba(37,211,102,.24);
    }

    .snapchat{
      color:#111;
      background:linear-gradient(90deg, var(--snap1), var(--snap2));
      box-shadow:0 10px 24px rgba(255,239,0,.18);
    }

    .mini-grid{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:14px;
    }

    .mini-btn{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:14px 16px;
      border-radius:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      font-size:.97rem;
      font-weight:800;
      cursor:pointer;
      transition:transform .18s ease, background .22s ease;
      overflow:hidden;
    }

    .mini-btn:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.11);
    }

    .right-side{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:8px 8px 8px 0;
    }

    .avatar-wrap{
      width:128px;
      height:128px;
      border-radius:50%;
      padding:4px;
      background:linear-gradient(135deg, #f4e3c2, #8a8077, #fff);
      box-shadow:0 12px 26px rgba(0,0,0,.34);
      margin-bottom:18px;
    }

    .avatar{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      display:block;
      border:3px solid rgba(255,255,255,.76);
      background:#222;
    }

    h1{
      font-size:2.25rem;
      line-height:1.1;
      font-weight:800;
      margin-bottom:6px;
    }

    .username{
      color:var(--muted);
      font-size:1rem;
      margin-bottom:12px;
    }

    .bio{
      color:rgba(255,255,255,.93);
      font-size:1rem;
      line-height:1.95;
    }

    .line{
      height:1px;
      background:rgba(255,255,255,.13);
      margin:20px 0 12px;
    }

    .footer{
      text-align:center;
      color:rgba(255,255,255,.80);
      font-size:.95rem;
    }

    .footer span{
      color:#ff5f7e;
      font-weight:800;
    }

    .toast{
      position:fixed;
      bottom:18px;
      left:50%;
      transform:translateX(-50%) translateY(20px);
      background:rgba(15,18,24,.92);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      padding:12px 16px;
      border-radius:14px;
      opacity:0;
      pointer-events:none;
      transition:.28s ease;
      box-shadow:0 12px 30px rgba(0,0,0,.26);
      font-size:.94rem;
      font-weight:700;
      z-index:50;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width: 900px){
      .layout{
        grid-template-columns:1fr;
      }

      .right-side{
        padding:0;
      }
    }

    @media (max-width: 680px){
      body{
        padding:14px;
      }

      .card{
        border-radius:24px;
        padding:18px 14px;
      }

      .stats-grid{
        grid-template-columns:1fr;
      }

      .buttons-grid,
      .mini-grid{
        grid-template-columns:1fr;
      }

      .avatar-wrap{
        width:106px;
        height:106px;
      }

      h1{
        font-size:1.8rem;
      }

      .bio{
        font-size:.95rem;
      }

      .info-box{
        min-height:120px;
        border-radius:18px;
      }

      .btn{
        border-radius:18px;
        min-height:56px;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <main class="wrap">
    <section class="card">
      <div class="layout">

        <div class="left-side">
          <div class="stats-grid">
            <div class="info-box">
              <i class="fa-solid fa-link"></i>
              <div class="info-title">Website</div>
              <div class="info-value">Copy Link</div>
              <button class="small-btn" id="copySiteBtn">Copy URL</button>
            </div>

            <div class="info-box">
              <i class="fa-solid fa-signal"></i>
              <div class="info-title">Status</div>
              <div class="info-value">Online</div>
            </div>

            <div class="info-box">
              <i class="fa-regular fa-eye"></i>
              <div class="info-title">Visitors</div>
              <div class="info-value" id="visitor-count">Loading...</div>
            </div>
          </div>

          <div class="buttons-grid">
            <a class="btn tiktok" href="https://www.tiktok.com/@saifqaryeb" target="_blank" rel="noopener">
              <span>TikTok</span>
              <i class="fa-brands fa-tiktok"></i>
            </a>

            <a class="btn instagram" href="https://instagram.com/saifqaryeb" target="_blank" rel="noopener">
              <span>Instagram</span>
              <i class="fa-brands fa-instagram"></i>
            </a>

            <a class="btn whatsapp" href="https://wa.me/972598893689?text=مرحبا%20سيف" target="_blank" rel="noopener">
              <span>WhatsApp</span>
              <i class="fa-brands fa-whatsapp"></i>
            </a>

            <a class="btn snapchat" href="https://www.snapchat.com/add/saif-qaryeb" target="_blank" rel="noopener">
              <span>Snapchat</span>
              <i class="fa-brands fa-snapchat"></i>
            </a>
          </div>

          <div class="mini-grid">
            <button class="mini-btn" id="shareBtn">
              <span>Share Site</span>
              <i class="fa-solid fa-share-nodes"></i>
            </button>

            <button class="mini-btn" id="copyUserBtn">
              <span>Copy Username</span>
              <i class="fa-regular fa-copy"></i>
            </button>
          </div>
        </div>

        <div class="right-side">
          <div class="avatar-wrap">
            <img src="profile.jpg" alt="Saif Qaryeb" class="avatar">
          </div>

          <h1>سيف قريب</h1>
          <div class="username">@saifqaryeb</div>

          <div class="bio">
            Computer Engineering 25<br>
            Testing Website 2026/2027
          </div>
        </div>

      </div>

      <div class="line"></div>
      <div class="footer">Made with <span>♥</span> by Saif</div>
    </section>
  </main>

  <div class="toast" id="toast">Done</div>

  <script>
    const toast = document.getElementById("toast");

    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    // Ripple + press effect
    document.querySelectorAll(".btn, .mini-btn, .small-btn").forEach((btn) => {
      btn.addEventListener("click", function(e) {
        this.classList.remove("clicked");
        void this.offsetWidth;
        this.classList.add("clicked");

        const rect = this.getBoundingClientRect();
        const ripple = document.createElement("span");
        ripple.className = "ripple";

        const size = Math.max(rect.width, rect.height);
        ripple.style.width = size + "px";
        ripple.style.height = size + "px";
        ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
        ripple.style.top = (e.clientY - rect.top - size / 2) + "px";

        this.appendChild(ripple);

        setTimeout(() => {
          ripple.remove();
          this.classList.remove("clicked");
        }, 720);
      });
    });

    // Copy username
    document.getElementById("copyUserBtn").addEventListener("click", async () => {
      try{
        await navigator.clipboard.writeText("@saifqaryeb");
        showToast("Username copied");
      }catch{
        showToast("Copy failed");
      }
    });

    // Copy URL
    document.getElementById("copySiteBtn").addEventListener("click", async () => {
      try{
        await navigator.clipboard.writeText(window.location.href);
        showToast("Website link copied");
      }catch{
        showToast("Copy failed");
      }
    });

    // Share site
    document.getElementById("shareBtn").addEventListener("click", async () => {
      if (navigator.share) {
        try{
          await navigator.share({
            title: "Saif Qaryeb",
            text: "Check out my website",
            url: window.location.href
          });
        }catch(e){}
      } else {
        try{
          await navigator.clipboard.writeText(window.location.href);
          showToast("Link copied");
        }catch{
          showToast("Share unavailable");
        }
      }
    });

    // Global counter with fallback local counter
    const visitorEl = document.getElementById("visitor-count");

    fetch("https://api.countapi.xyz/hit/saifqaryeb/sitevisits2026")
      .then(res => res.json())
      .then(data => {
        if (data && typeof data.value !== "undefined") {
          visitorEl.textContent = data.value;
        } else {
          throw new Error("Counter failed");
        }
      })
      .catch(() => {
        let localCount = localStorage.getItem("saif_local_visits_fallback");
        localCount = localCount ? parseInt(localCount) + 1 : 1;
        localStorage.setItem("saif_local_visits_fallback", localCount);
        visitorEl.textContent = localCount;
      });
  </script>

</body>
</html>
