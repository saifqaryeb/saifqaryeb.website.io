<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saif Qaryeb</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>
    :root{
      --text:#ffffff;
      --muted:rgba(255,255,255,.82);
      --glass1:rgba(255,255,255,.15);
      --glass2:rgba(255,255,255,.07);
      --stroke:rgba(255,255,255,.18);
      --soft:rgba(255,255,255,.08);
      --shadow:0 28px 60px rgba(0,0,0,.38);

      --ig1:#e1306c;
      --ig2:#ff4f8a;
      --tt1:#0d0e11;
      --tt2:#1b1c20;
      --snap1:#fff200;
      --snap2:#ffea00;
      --wa1:#16b857;
      --wa2:#25d366;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Cairo",sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      overflow-x:hidden;
      color:var(--text);
      background:#0d1118;
      position:relative;
    }

    /* الخلفية المتحركة */
    .bg{
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(8,12,18,.28), rgba(8,12,18,.62)),
        url("back.jpg") center center / cover no-repeat;
      z-index:-5;
      transform:scale(1.08);
      animation:bgDrift 18s ease-in-out infinite alternate;
      will-change:transform;
    }

    @keyframes bgDrift{
      0%   { transform:scale(1.08) translate3d(0,0,0); }
      50%  { transform:scale(1.11) translate3d(-10px,0,0); }
      100% { transform:scale(1.09) translate3d(10px,0,0); }
    }

    .bg::before,
    .bg::after{
      content:"";
      position:absolute;
      border-radius:50%;
      filter:blur(90px);
      opacity:.18;
      pointer-events:none;
    }

    .bg::before{
      width:300px;
      height:300px;
      background:#ff4f8a;
      top:8%;
      left:8%;
      animation:blob1 12s ease-in-out infinite alternate;
    }

    .bg::after{
      width:340px;
      height:340px;
      background:#3aa1ff;
      bottom:6%;
      right:8%;
      animation:blob2 14s ease-in-out infinite alternate;
    }

    @keyframes blob1{
      from{ transform:translate(0,0); }
      to{ transform:translate(18px,-10px); }
    }

    @keyframes blob2{
      from{ transform:translate(0,0); }
      to{ transform:translate(-20px,12px); }
    }

    .wrap{
      width:min(100%, 560px);
      perspective:1200px;
      animation:fadeUp .85s ease;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(20px) scale(.985);
      }
      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:34px;
      padding:28px 22px 22px;
      background:linear-gradient(180deg, var(--glass1), var(--glass2));
      border:1px solid var(--stroke);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.10);
      transform-style:preserve-3d;
      animation:cardFloat 7s ease-in-out infinite;
    }

    @keyframes cardFloat{
      0%   { transform:rotate(-1.2deg) translateX(-8px); }
      50%  { transform:rotate(1.2deg) translateX(8px); }
      100% { transform:rotate(-1.2deg) translateX(-8px); }
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.10), transparent 36%, transparent 72%, rgba(255,255,255,.05));
      pointer-events:none;
    }

    .card::after{
      content:"";
      position:absolute;
      top:-30%;
      left:-45%;
      width:40%;
      height:180%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
      transform:rotate(18deg);
      animation:shineMove 7s linear infinite;
      pointer-events:none;
    }

    @keyframes shineMove{
      0%{ left:-55%; }
      100%{ left:130%; }
    }

    .profile{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      margin-bottom:22px;
    }

    .avatar-wrap{
      width:126px;
      height:126px;
      border-radius:50%;
      padding:4px;
      background:linear-gradient(135deg, #f5e4c3, #8a8077, #fff);
      box-shadow:0 12px 26px rgba(0,0,0,.34);
      margin-bottom:18px;
      position:relative;
    }

    .avatar-wrap::after{
      content:"";
      position:absolute;
      inset:-6px;
      border:1px solid rgba(255,255,255,.16);
      border-radius:50%;
    }

    .avatar{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      display:block;
      border:3px solid rgba(255,255,255,.76);
      background:#222;
    }

    h1{
      font-size:2.3rem;
      line-height:1.1;
      font-weight:800;
      margin-bottom:6px;
      text-shadow:0 6px 20px rgba(0,0,0,.18);
    }

    .username{
      color:var(--muted);
      font-size:1rem;
      margin-bottom:12px;
    }

    .bio{
      color:rgba(255,255,255,.95);
      font-size:1rem;
      line-height:1.95;
    }

    .main-links{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .btn{
      position:relative;
      min-height:60px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-decoration:none;
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:20px;
      padding:15px 18px;
      font-size:1.02rem;
      font-weight:800;
      transition:transform .18s ease, box-shadow .24s ease, filter .24s ease;
      overflow:hidden;
      user-select:none;
      color:#fff;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    .btn i{
      font-size:1.18rem;
    }

    .btn:hover{
      transform:translateY(-2px) scale(1.01);
      filter:brightness(1.03);
    }

    .btn:active{
      transform:scale(.985);
    }

    .btn::before,
    .mini-btn::before{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:52%;
      height:100%;
      transform:skewX(-24deg);
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.28), transparent);
      transition:left .65s ease;
      pointer-events:none;
    }

    .btn:hover::before,
    .mini-btn:hover::before{
      left:130%;
    }

    .btn.clicked,
    .mini-btn.clicked{
      animation:press .45s ease;
    }

    @keyframes press{
      0%{ transform:scale(1); }
      35%{ transform:scale(.965); }
      70%{ transform:scale(1.03); }
      100%{ transform:scale(1); }
    }

    .ripple{
      position:absolute;
      border-radius:50%;
      transform:scale(0);
      background:rgba(255,255,255,.34);
      animation:ripple .72s ease-out forwards;
      pointer-events:none;
    }

    @keyframes ripple{
      to{
        transform:scale(16);
        opacity:0;
      }
    }

    .instagram{
      background:linear-gradient(90deg, var(--ig1), var(--ig2));
    }

    .tiktok{
      background:linear-gradient(90deg, var(--tt1), var(--tt2));
    }

    .snapchat{
      color:#111;
      background:linear-gradient(90deg, var(--snap1), var(--snap2));
    }

    .whatsapp{
      background:linear-gradient(90deg, var(--wa1), var(--wa2));
    }

    .mini-row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      margin-top:14px;
    }

    .mini-btn{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:14px 16px;
      border-radius:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      font-size:.96rem;
      font-weight:800;
      cursor:pointer;
      transition:transform .18s ease, background .22s ease;
      overflow:hidden;
    }

    .mini-btn:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.11);
    }

    .line{
      height:1px;
      background:rgba(255,255,255,.13);
      margin:20px 0 12px;
    }

    .footer{
      text-align:center;
      color:rgba(255,255,255,.82);
      font-size:.95rem;
    }

    .footer span{
      color:#ff5f7e;
      font-weight:800;
    }

    .toast{
      position:fixed;
      bottom:18px;
      left:50%;
      transform:translateX(-50%) translateY(20px);
      background:rgba(15,18,24,.92);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      padding:12px 16px;
      border-radius:14px;
      opacity:0;
      pointer-events:none;
      transition:.28s ease;
      box-shadow:0 12px 30px rgba(0,0,0,.26);
      font-size:.94rem;
      font-weight:700;
      z-index:50;
      white-space:nowrap;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    /* للموبايل */
    @media (max-width: 640px){
      body{
        padding:14px;
      }

      .wrap{
        width:100%;
      }

      .card{
        border-radius:26px;
        padding:24px 16px 18px;
        animation:none;
      }

      .avatar-wrap{
        width:108px;
        height:108px;
      }

      h1{
        font-size:1.9rem;
      }

      .bio{
        font-size:.95rem;
        line-height:1.85;
      }

      .btn{
        min-height:58px;
        border-radius:18px;
        font-size:.98rem;
      }

      .mini-row{
        grid-template-columns:1fr 1fr;
      }
    }

    @media (max-width: 430px){
      .mini-row{
        grid-template-columns:1fr;
      }

      h1{
        font-size:1.75rem;
      }

      .username{
        font-size:.95rem;
      }

      .bio{
        font-size:.92rem;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <main class="wrap">
    <section class="card" id="card">

      <div class="profile">
        <div class="avatar-wrap">
          <img src="profile.jpg" alt="Saif Qaryeb" class="avatar">
        </div>

        <h1>سيف قريب</h1>
        <div class="username">@saifqaryeb</div>

        <div class="bio">
          Computer Engineering 25<br>
          Testing Website 2026/2027
        </div>
      </div>

      <div class="main-links">
        <a class="btn instagram" href="https://instagram.com/saifqaryeb" target="_blank" rel="noopener">
          <span>Instagram</span>
          <i class="fa-brands fa-instagram"></i>
        </a>

        <a class="btn tiktok" href="https://www.tiktok.com/@saifqaryeb" target="_blank" rel="noopener">
          <span>TikTok</span>
          <i class="fa-brands fa-tiktok"></i>
        </a>

        <a class="btn snapchat" href="https://www.snapchat.com/add/saif-qaryeb" target="_blank" rel="noopener">
          <span>Snapchat</span>
          <i class="fa-brands fa-snapchat"></i>
        </a>

        <a class="btn whatsapp" href="https://wa.me/972598893689?text=مرحبا%20سيف" target="_blank" rel="noopener">
          <span>WhatsApp</span>
          <i class="fa-brands fa-whatsapp"></i>
        </a>
      </div>

      <div class="mini-row">
        <button class="mini-btn" id="shareBtn">
          <span>Share Site</span>
          <i class="fa-solid fa-share-nodes"></i>
        </button>

        <button class="mini-btn" id="copyUserBtn">
          <span>Copy Username</span>
          <i class="fa-regular fa-copy"></i>
        </button>
      </div>

      <div class="line"></div>
      <div class="footer">Made with <span>♥</span> by Saif</div>
    </section>
  </main>

  <div class="toast" id="toast">Done</div>

  <script>
    const toast = document.getElementById("toast");

    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    document.querySelectorAll(".btn, .mini-btn").forEach((btn) => {
      btn.addEventListener("click", function(e) {
        this.classList.remove("clicked");
        void this.offsetWidth;
        this.classList.add("clicked");

        const rect = this.getBoundingClientRect();
        const ripple = document.createElement("span");
        ripple.className = "ripple";

        const size = Math.max(rect.width, rect.height);
        ripple.style.width = size + "px";
        ripple.style.height = size + "px";
        ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
        ripple.style.top = (e.clientY - rect.top - size / 2) + "px";

        this.appendChild(ripple);

        setTimeout(() => {
          ripple.remove();
          this.classList.remove("clicked");
        }, 720);
      });
    });

    document.getElementById("copyUserBtn").addEventListener("click", async () => {
      try{
        await navigator.clipboard.writeText("@saifqaryeb");
        showToast("Username copied");
      }catch{
        showToast("Copy failed");
      }
    });

    document.getElementById("shareBtn").addEventListener("click", async () => {
      if (navigator.share) {
        try{
          await navigator.share({
            title: "Saif Qaryeb",
            text: "Check out my website",
            url: window.location.href
          });
        }catch(e){}
      } else {
        try{
          await navigator.clipboard.writeText(window.location.href);
          showToast("Link copied");
        }catch{
          showToast("Share unavailable");
        }
      }
    });

    // Tilt on desktop فقط
    const card = document.getElementById("card");
    if (window.innerWidth > 768) {
      card.addEventListener("mousemove", (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const rotateX = ((y - centerY) / centerY) * -2.8;
        const rotateY = ((x - centerX) / centerX) * 2.8;

        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      });

      card.addEventListener("mouseleave", () => {
        card.style.transform = "";
      });
    }
  </script>

</body>
</html>
