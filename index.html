<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saif Qaryeb</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Cairo", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0e1116;
      overflow-x: hidden;
      position: relative;
      color: white;
      padding: 20px;
    }

    .background {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(7, 10, 15, 0.35), rgba(7, 10, 15, 0.60)),
        url("back.jpg") center center / cover no-repeat;
      z-index: -3;
      transform: scale(1.03);
    }

    .background::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 90, 150, 0.16), transparent 24%),
        radial-gradient(circle at 85% 25%, rgba(0, 183, 255, 0.14), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(255, 255, 255, 0.06), transparent 30%);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 430px;
      border-radius: 30px;
      padding: 32px 24px 24px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow:
        0 15px 40px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.12);
      animation: fadeUp 0.8s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent 40%, transparent 70%, rgba(255,255,255,0.04));
      pointer-events: none;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .avatar-wrap {
      width: 118px;
      height: 118px;
      margin: 0 auto 18px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, #f3e2be, #8c8278, #ffffff);
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.75);
      display: block;
      background: #222;
    }

    h1 {
      font-size: 2rem;
      line-height: 1.1;
      margin-bottom: 6px;
      font-weight: 800;
    }

    .username {
      font-size: 1.02rem;
      color: rgba(255,255,255,0.82);
      margin-bottom: 16px;
    }

    .bio {
      font-size: 1rem;
      line-height: 1.9;
      color: rgba(255,255,255,0.94);
      margin-bottom: 24px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      position: relative;
      width: 100%;
      text-decoration: none;
      border: none;
      border-radius: 18px;
      padding: 15px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.25s ease, filter 0.25s ease;
    }

    .btn i {
      font-size: 1.25rem;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.01);
      filter: brightness(1.03);
    }

    .btn:active {
      transform: scale(0.985);
    }

    .btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 55%;
      height: 100%;
      transform: skewX(-25deg);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      transition: left 0.65s ease;
    }

    .btn:hover::before {
      left: 130%;
    }

    .btn.clicked {
      animation: clickPop 0.45s ease;
    }

    @keyframes clickPop {
      0% { transform: scale(1); }
      35% { transform: scale(0.96); }
      70% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      background: rgba(255,255,255,0.33);
      animation: rippleAnim 0.7s ease-out forwards;
      pointer-events: none;
    }

    @keyframes rippleAnim {
      to {
        transform: scale(16);
        opacity: 0;
      }
    }

    .instagram {
      background: linear-gradient(90deg, #d63384, #de3c73, #c92d70);
      color: #fff;
      box-shadow: 0 10px 25px rgba(214,51,132,0.26);
    }

    .tiktok {
      background: #0f1013;
      color: #fff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.28);
    }

    .snapchat {
      background: #ffef00;
      color: #111;
      box-shadow: 0 10px 25px rgba(255,239,0,0.22);
    }

    .whatsapp {
      background: linear-gradient(90deg, #18b857, #22c55e, #25d366);
      color: #fff;
      box-shadow: 0 10px 25px rgba(37,211,102,0.25);
    }

    .footer-line {
      height: 1px;
      background: rgba(255,255,255,0.14);
      margin: 22px 0 14px;
    }

    .footer {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.78);
    }

    .footer span {
      color: #ff5f7e;
      font-weight: 800;
    }

    @media (max-width: 480px) {
      body {
        padding: 14px;
        align-items: center;
      }

      .card {
        max-width: 100%;
        border-radius: 24px;
        padding: 26px 18px 20px;
      }

      .avatar-wrap {
        width: 102px;
        height: 102px;
      }

      h1 {
        font-size: 1.65rem;
      }

      .username {
        font-size: 0.97rem;
      }

      .bio {
        font-size: 0.95rem;
        line-height: 1.8;
      }

      .btn {
        padding: 14px 14px;
        border-radius: 16px;
        font-size: 0.98rem;
      }

      .btn i {
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>

  <div class="background"></div>

  <div class="card">
    <div class="avatar-wrap">
      <img src="profile.jpg" alt="Saif Qaryeb" class="avatar">
    </div>

    <h1>سيف قريب</h1>
    <div class="username">@saifqaryeb</div>

    <div class="bio">
      Computer Engineering 25<br>
      Testing Website 2026/2027
    </div>

    <div class="buttons">
      <a class="btn instagram" href="https://instagram.com/saifqaryeb" target="_blank">
        <i class="fa-brands fa-instagram"></i>
        <span>Instagram</span>
      </a>

      <a class="btn tiktok" href="https://www.tiktok.com/@saifqaryeb" target="_blank">
        <i class="fa-brands fa-tiktok"></i>
        <span>TikTok</span>
      </a>

      <a class="btn snapchat" href="https://www.snapchat.com/add/saif-qaryeb" target="_blank">
        <i class="fa-brands fa-snapchat"></i>
        <span>Snapchat</span>
      </a>

      <a class="btn whatsapp" href="https://wa.me/972598893689" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
        <span>WhatsApp</span>
      </a>
    </div>

    <div class="footer-line"></div>
    <div class="footer">Made with <span>♥</span> by Saif</div>
  </div>

  <script>
    document.querySelectorAll(".btn").forEach((btn) => {
      btn.addEventListener("click", function(e) {
        this.classList.remove("clicked");
        void this.offsetWidth;
        this.classList.add("clicked");

        const ripple = document.createElement("span");
        ripple.className = "ripple";

        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);

        ripple.style.width = size + "px";
        ripple.style.height = size + "px";
        ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
        ripple.style.top = (e.clientY - rect.top - size / 2) + "px";

        this.appendChild(ripple);

        setTimeout(() => {
          ripple.remove();
          this.classList.remove("clicked");
        }, 700);
      });
    });
  </script>

</body>
</html>
