<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saif Qaryeb</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>
    :root{
      --text:#fff;
      --muted:rgba(255,255,255,.78);
      --card-bg:rgba(255,255,255,.11);
      --card-bg-2:rgba(255,255,255,.07);
      --stroke:rgba(255,255,255,.16);
      --shadow:0 24px 60px rgba(0,0,0,.35);
      --ig1:#d63384;
      --ig2:#ff4f86;
      --tt1:#0d0e11;
      --tt2:#191b1f;
      --snap1:#fff200;
      --snap2:#ffef00;
      --wa1:#18b857;
      --wa2:#25d366;
      --soft:rgba(255,255,255,.08);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Cairo",sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      color:var(--text);
      overflow-x:hidden;
      background:#0c1016;
      position:relative;
    }

    .bg{
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(8,12,18,.28), rgba(8,12,18,.62)),
        url("back.jpg") center center / cover no-repeat;
      z-index:-3;
      transform:scale(1.04);
    }

    .glow{
      position:fixed;
      border-radius:50%;
      filter:blur(80px);
      opacity:.18;
      z-index:-2;
      pointer-events:none;
    }

    .glow.one{
      width:270px;
      height:270px;
      background:#ff4d89;
      top:8%;
      left:6%;
    }

    .glow.two{
      width:320px;
      height:320px;
      background:#35a2ff;
      bottom:4%;
      right:8%;
    }

    .wrap{
      width:min(100%, 820px);
      animation:fadeUp .85s ease;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(22px) scale(.985);
      }
      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:32px;
      background:linear-gradient(180deg, var(--card-bg), var(--card-bg-2));
      border:1px solid var(--stroke);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.10);
      padding:28px;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.08), transparent 38%, transparent 72%, rgba(255,255,255,.05));
      pointer-events:none;
    }

    .top{
      display:grid;
      grid-template-columns: 190px 1fr;
      gap:24px;
      align-items:center;
    }

    .left-panel{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .avatar-wrap{
      width:125px;
      height:125px;
      border-radius:50%;
      padding:4px;
      background:linear-gradient(135deg, #f5e4c3, #8d8278, #fff);
      box-shadow:0 12px 26px rgba(0,0,0,.34);
      margin-bottom:16px;
    }

    .avatar{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      display:block;
      border:3px solid rgba(255,255,255,.76);
      background:#222;
    }

    h1{
      font-size:2rem;
      line-height:1.1;
      font-weight:800;
      margin-bottom:4px;
    }

    .username{
      color:var(--muted);
      font-size:1rem;
      margin-bottom:10px;
    }

    .bio{
      color:rgba(255,255,255,.93);
      font-size:.98rem;
      line-height:1.9;
      text-align:center;
    }

    .right-panel{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .info-grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:12px;
    }

    .info-box{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:14px 12px;
      text-align:center;
      min-height:86px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:4px;
    }

    .info-box i{
      font-size:1.1rem;
      opacity:.95;
    }

    .info-title{
      font-size:.84rem;
      color:var(--muted);
      font-weight:600;
    }

    .info-value{
      font-size:1rem;
      font-weight:800;
      color:#fff;
      word-break:break-word;
    }

    .buttons{
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:14px;
    }

    .btn{
      position:relative;
      width:100%;
      min-height:58px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      text-decoration:none;
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:18px;
      padding:15px 18px;
      font-size:1rem;
      font-weight:800;
      transition:transform .18s ease, box-shadow .24s ease, filter .24s ease;
      overflow:hidden;
      user-select:none;
    }

    .btn i{
      font-size:1.18rem;
    }

    .btn:hover{
      transform:translateY(-2px) scale(1.01);
      filter:brightness(1.03);
    }

    .btn:active{
      transform:scale(.985);
    }

    .btn::before{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:52%;
      height:100%;
      transform:skewX(-24deg);
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.28), transparent);
      transition:left .65s ease;
    }

    .btn:hover::before{
      left:130%;
    }

    .btn.clicked{
      animation:press .45s ease;
    }

    @keyframes press{
      0%{ transform:scale(1); }
      35%{ transform:scale(.965); }
      70%{ transform:scale(1.03); }
      100%{ transform:scale(1); }
    }

    .ripple{
      position:absolute;
      border-radius:50%;
      transform:scale(0);
      background:rgba(255,255,255,.34);
      animation:ripple .72s ease-out forwards;
      pointer-events:none;
    }

    @keyframes ripple{
      to{
        transform:scale(16);
        opacity:0;
      }
    }

    .instagram{
      color:#fff;
      background:linear-gradient(90deg, var(--ig1), var(--ig2));
      box-shadow:0 10px 24px rgba(214,51,132,.25);
    }

    .tiktok{
      color:#fff;
      background:linear-gradient(90deg, var(--tt1), var(--tt2));
      box-shadow:0 10px 24px rgba(0,0,0,.28);
    }

    .snapchat{
      color:#111;
      background:linear-gradient(90deg, var(--snap1), var(--snap2));
      box-shadow:0 10px 24px rgba(255,239,0,.18);
    }

    .whatsapp{
      color:#fff;
      background:linear-gradient(90deg, var(--wa1), var(--wa2));
      box-shadow:0 10px 24px rgba(37,211,102,.24);
    }

    .bottom-row{
      margin-top:16px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }

    .mini-btn{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:9px;
      padding:13px 14px;
      border-radius:16px;
      background:var(--soft);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      font-size:.96rem;
      font-weight:800;
      cursor:pointer;
      transition:transform .18s ease, background .22s ease;
      overflow:hidden;
    }

    .mini-btn:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.11);
    }

    .line{
      height:1px;
      background:rgba(255,255,255,.13);
      margin:18px 0 12px;
    }

    .footer{
      text-align:center;
      color:rgba(255,255,255,.78);
      font-size:.92rem;
    }

    .footer span{
      color:#ff5f7e;
      font-weight:800;
    }

    .toast{
      position:fixed;
      bottom:18px;
      left:50%;
      transform:translateX(-50%) translateY(20px);
      background:rgba(15,18,24,.90);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      padding:12px 16px;
      border-radius:14px;
      opacity:0;
      pointer-events:none;
      transition:.28s ease;
      box-shadow:0 12px 30px rgba(0,0,0,.26);
      font-size:.94rem;
      font-weight:700;
      z-index:40;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width: 820px){
      .top{
        grid-template-columns:1fr;
        text-align:center;
      }

      .left-panel{
        margin-bottom:4px;
      }
    }

    @media (max-width: 640px){
      .card{
        border-radius:24px;
        padding:22px 16px 18px;
      }

      .avatar-wrap{
        width:106px;
        height:106px;
      }

      h1{
        font-size:1.72rem;
      }

      .bio{
        font-size:.95rem;
      }

      .info-grid{
        grid-template-columns:1fr;
      }

      .buttons{
        grid-template-columns:1fr;
      }

      .bottom-row{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="glow one"></div>
  <div class="glow two"></div>

  <main class="wrap">
    <section class="card">
      <div class="top">

        <div class="left-panel">
          <div class="avatar-wrap">
            <img src="profile.jpg" alt="Saif Qaryeb" class="avatar">
          </div>

          <h1>سيف قريب</h1>
          <div class="username" id="username">@saifqaryeb</div>

          <div class="bio">
            Computer Engineering 25<br>
            Testing Website 2026/2027
          </div>
        </div>

        <div class="right-panel">
          <div class="info-grid">
            <div class="info-box">
              <i class="fa-regular fa-eye"></i>
              <div class="info-title">Visitors</div>
              <div class="info-value" id="visitor-count">...</div>
            </div>

            <div class="info-box">
              <i class="fa-solid fa-user"></i>
              <div class="info-title">Username</div>
              <div class="info-value">saifqaryeb</div>
            </div>

            <div class="info-box">
              <i class="fa-solid fa-share-nodes"></i>
              <div class="info-title">Website</div>
              <div class="info-value">Live Now</div>
            </div>
          </div>

          <div class="buttons">
            <a class="btn instagram" href="https://instagram.com/saifqaryeb" target="_blank" rel="noopener">
              <i class="fa-brands fa-instagram"></i>
              <span>Instagram</span>
            </a>

            <a class="btn tiktok" href="https://www.tiktok.com/@saifqaryeb" target="_blank" rel="noopener">
              <i class="fa-brands fa-tiktok"></i>
              <span>TikTok</span>
            </a>

            <a class="btn snapchat" href="https://www.snapchat.com/add/saif-qaryeb" target="_blank" rel="noopener">
              <i class="fa-brands fa-snapchat"></i>
              <span>Snapchat</span>
            </a>

            <a class="btn whatsapp" href="https://wa.me/972598893689?text=مرحبا%20سيف" target="_blank" rel="noopener">
              <i class="fa-brands fa-whatsapp"></i>
              <span>WhatsApp</span>
            </a>
          </div>

          <div class="bottom-row">
            <button class="mini-btn" id="copyBtn">
              <i class="fa-regular fa-copy"></i>
              <span>Copy Username</span>
            </button>

            <button class="mini-btn" id="shareBtn">
              <i class="fa-solid fa-share"></i>
              <span>Share Site</span>
            </button>
          </div>
        </div>
      </div>

      <div class="line"></div>
      <div class="footer">Made with <span>♥</span> by Saif</div>
    </section>
  </main>

  <div class="toast" id="toast">Done</div>

  <script>
    // Ripple + press
    document.querySelectorAll(".btn, .mini-btn").forEach((btn) => {
      btn.addEventListener("click", function(e) {
        this.classList.remove("clicked");
        void this.offsetWidth;
        this.classList.add("clicked");

        const ripple = document.createElement("span");
        ripple.className = "ripple";

        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);

        ripple.style.width = size + "px";
        ripple.style.height = size + "px";
        ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
        ripple.style.top = (e.clientY - rect.top - size / 2) + "px";

        this.appendChild(ripple);

        setTimeout(() => {
          ripple.remove();
          this.classList.remove("clicked");
        }, 720);
      });
    });

    // Toast
    const toast = document.getElementById("toast");
    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    }

    // Copy username
    document.getElementById("copyBtn").addEventListener("click", async () => {
      try{
        await navigator.clipboard.writeText("@saifqaryeb");
        showToast("Username copied");
      }catch{
        showToast("Copy failed");
      }
    });

    // Share site
    document.getElementById("shareBtn").addEventListener("click", async () => {
      if(navigator.share){
        try{
          await navigator.share({
            title: "Saif Qaryeb",
            text: "Check out my website",
            url: window.location.href
          });
        }catch(e){}
      } else {
        try{
          await navigator.clipboard.writeText(window.location.href);
          showToast("Link copied");
        }catch{
          showToast("Share unavailable");
        }
      }
    });

    // Visitor counter
    fetch("https://api.countapi.xyz/hit/saifqaryeb/github-site")
      .then(res => res.json())
      .then(data => {
        document.getElementById("visitor-count").textContent = data.value;
      })
      .catch(() => {
        document.getElementById("visitor-count").textContent = "N/A";
      });
  </script>

</body>
</html>
